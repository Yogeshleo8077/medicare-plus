version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: medicare-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build: ./server
    container_name: medicare-server
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/medicare-plus
      # Change these if you want the container to use different credentials
      - JWT_SECRET=super_secret_jwt_key_change_in_production
      - PORT=5000
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: unless-stopped

  client:
    build: ./client
    container_name: medicare-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server
    volumes:
      - ./client:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongodb_data:
